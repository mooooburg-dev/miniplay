name: Issue Slack 알림

on:
  issues:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Slack 알림 전송
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"text\": \"📋 새 이슈가 등록되었습니다\",
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*📋 새 이슈가 등록되었습니다*\n\n*<${{ github.event.issue.html_url }}|#${{ github.event.issue.number }} ${{ github.event.issue.title }}>*\n\n${{ github.event.issue.body && '> ' || '' }}$(echo '${{ github.event.issue.body }}' | head -c 200)\"
                  }
                }
              ]
            }" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
